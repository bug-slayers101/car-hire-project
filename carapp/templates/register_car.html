{% extends 'base.html' %}
{% block title %}Register Car{% endblock %}
{% block content %}
<div class="container">
    <h1>Register Your Car</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Register Car</button>
    </form>
</div>
{% endblock %}
