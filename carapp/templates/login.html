{% extends 'base.html' %}
{% load static %}
{% block title%}Login{% endblock %}
{% block content %}
<div class="container-md">
    <div class="row justify-content-center">
        <div class="col-md-6">
        <div class="card shadow p-4 mt-5">
    <h1 display="1">Login</h1>
    <p>Enter your credentials below to log in:</p>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-success w-100" type="submit" >Login</button>
        <p>Don't have an account? <a href="{% url 'register_profile' 'client' %}">Register as Client</a> or <a href="{% url 'register_profile' 'owner' %}">Register as Owner</a></p>
    </form>
    </div>
    </div>
    </div>
</div>
{% endblock %}
