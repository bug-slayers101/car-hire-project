{% extends 'base.html' %}
 {% load static %}
 {% block title %}Contact{% endblock %}
   {% block content %}

      <div class="contact_section layout_padding">
         <div class="container">
            <div class="row">
               <div class="col-md-12">
                  <h1 class="contact_taital">Register New Car</h1>
               </div>
            </div>
            <div class="contact_section_2">
               <div class="mail_section map_form_container">
                  <form action="" method="POST" enctype="multipart/form-data" class="contact-form">
   {% csrf_token %}

   <div class="form-group">
      <input type="text" class="mail_text form-control" placeholder="Name" name="name" required>
   </div>
   <div class="form-group">
      <input type="text" class="mail_text form-control" placeholder="Phone Number" name="phone" required>
   </div>
   <div class="form-group">
      <input type="email" class="mail_text form-control" placeholder="Email" name="email" required>
   </div>
   <div class="form-group">
      <input type="text" class="mail_text form-control" placeholder="Car Model" name="car_model" required>
   </div>
   <div class="form-group">
      <input type="number" class="mail_text form-control" placeholder="Price" name="price" step="0.01" min="0" required>
   </div>

   <!-- ✅ IMAGE FIELD -->
   <div class="form-group">
      <input type="file" class="mail_text form-control-file" name="image" accept="image/*" required>
   </div>
   <div class="form-group">
      <button class="map_bt btn btn-success w-100 btn-lg" type="submit">
         <i class="fa fa-paper-plane"></i> Submit Registration
      </button>
   </div>
</form>
                  <div class="map_main map_container">
                     <div class="map-responsive">
                        <iframe src="https://www.google.com/maps/embed/v1/place?key=AIzaSyA0s1a7phLN0iaD6-UE7m4qP-z21pH0eSc&amp;q=Eiffel+Tower+Paris+France" width="600" height="368" frameborder="0" style="border:0; width: 100%;" allowfullscreen=""></iframe>
                         <div class="map_btn_main">
                           <div class="map_bt d-flex justify-content-center w-100 map_center"><a href="#" id="showForm">Form</a></div>
                        </div>
                     </div>
                  </div>
               </div>
            </div>
            <div class="location_main">
               <div class="location_text">
                  <ul>
                     <li><a href="#"><i class="fa fa-phone" aria-hidden="true"></i><span class="padding_left_15">(+71) 8522369417</span></a></li>
                     <li><a href="#"><i class="fa fa-envelope" aria-hidden="true"></i><span class="padding_left_15">demo@gmail.com</span></a></li>
                  </ul>
               </div>
            </div>
            <div class="social_icon">
               <ul>
                  <li><a href="#"><i class="fa fa-facebook" aria-hidden="true"></i></a></li>
                  <li><a href="#"><i class="fa fa-twitter" aria-hidden="true"></i></a></li>
                  <li><a href="#"><i class="fa fa-linkedin" aria-hidden="true"></i></a></li>
                  <li><a href="#"><i class="fa fa-instagram" aria-hidden="true"></i></a></li>
               </ul>
            </div>
         </div>
      </div>
      <!-- contact section end -->
       {% endblock %}
