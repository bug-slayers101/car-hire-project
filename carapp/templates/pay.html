{% extends 'base.html' %}
{% load static %}
{% block title %}Make Payment{% endblock %}

{% block content %}
<div class="container-md mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow p-4 bg-dark border-secondary">
                <h1 class="display-5 text-light mb-3">Complete Payment</h1>
                <p class="text-muted mb-4">Finalize your purchase for <strong class="text-info">{{ inquiry.car.model }}</strong></p>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label text-light">Car</label>
                        <input type="text" class="form-control" value="{{ inquiry.car.model }}" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-light">Total Amount</label>
                        <input type="text" class="form-control" value="KSH {{ inquiry.total_price }}" readonly>
                    </div>

                    <hr class="border-secondary">
                    
                    <h5 class="text-light mb-3">Card Details</h5>

                    <div class="mb-3">
                        <label class="form-label text-light">Cardholder Name</label>
                        <input type="text" name="cardholder" class="form-control" placeholder="Full Name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-light">Card Number</label>
                        <input type="text" name="card_number" class="form-control" maxlength="19" placeholder="1234 5678 9012 3456" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-light">Expiry Date</label>
                            <input type="text" name="expiry" class="form-control" placeholder="MM/YY" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-light">CVV</label>
                            <input type="text" name="cvv" class="form-control" maxlength="4" placeholder="123" required>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button class="btn btn-success w-100" type="submit" name="action" value="accept">Pay KSH {{ inquiry.total_price }}</button>
                        <button class="btn btn-danger w-100" type="submit" name="action" value="reject">Reject</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
</div>
{% endblock %}
