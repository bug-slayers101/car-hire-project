{% extends 'base.html' %}
{% load static %}
{% block title %}Make Payment{% endblock %}

{% block content %}
<div class="container-md">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="display-4">Make Payment</h1>
            <p>Complete your payment for {{ inquiry.car.model }}.</p>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Car</label>
                    <input type="text" class="form-control" value="{{ inquiry.car.model }}" readonly>
                </div>

                <div class="mb-3">
                    <label class="form-label">Price</label>
                    <input type="text" class="form-control" value="${{ inquiry.total_price }}" readonly>
                </div>

                <div class="mb-3">
                    <label class="form-label">Cardholder Name</label>
                    <input type="text" name="cardholder" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Card Number</label>
                    <input type="text" name="card_number" class="form-control" maxlength="19" placeholder="xxxx xxxx xxxx xxxx" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Expiry</label>
                        <input type="text" name="expiry" class="form-control" placeholder="MM/YY" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">CVV</label>
                        <input type="text" name="cvv" class="form-control" maxlength="4" placeholder="123" required>
                    </div>
                </div>

                <button class="btn btn-success w-100" type="submit" name="action" value="accept">Pay ${{ inquiry.total_price }}</button>
                <button class="btn btn-danger w-100 mt-2" type="submit" name="action" value="reject">Reject</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
